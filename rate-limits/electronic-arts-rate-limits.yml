specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Electronic Arts
providerId: electronic-arts
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Gaming
  - Entertainment
description: Electronic Arts does not publish public developer API rate limits. Some EA online-services
  endpoints (account management, EA app) are internal and reverse-engineered by community projects but
  not officially supported. Use community-documented numbers at your own risk.
notes: No officially published rate-limit specification. Treat any inferred limits as best-effort and
  expect undocumented throttling.
sources:
  - https://www.ea.com
  - https://help.ea.com
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: EA online services (internal)
    scope: account
    metric: varies
    limit: undocumented
policies:
  - name: Backoff
    description: Implement exponential backoff with jitter and honor Retry-After if returned.
  - name: Unsupported access
    description: Public consumers should not rely on EA online endpoints for production integration; partner
      programs are the only supported channel.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
