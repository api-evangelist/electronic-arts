aid: electronic-arts
name: Electronic Arts
description: >-
  Electronic Arts (EA) is a global leader in digital interactive
  entertainment, developing and delivering games, content, and online
  services for internet-connected consoles, mobile devices, and personal
  computers. EA's portfolio includes franchises such as EA SPORTS FC, Madden
  NFL, Battlefield, The Sims, Apex Legends, and Need for Speed, supported by
  online services like EA app, EA Play, and Origin. EA does not currently
  publish a public developer API portal; integrations and data exchanges are
  handled through partner programs and the EA Help support and account
  surfaces.
type: Contract
