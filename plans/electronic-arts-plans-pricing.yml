specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Electronic Arts
providerId: electronic-arts
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Gaming
  - Entertainment
  - Consumer
  - Subscription
description: Electronic Arts (EA) does not publish a public developer API portal. Consumer-facing pricing
  is for the EA Play subscription tiers, not a developer API. Plans below capture the consumer EA Play
  subscription as the only documented commercial offering directly tied to EA's online services.
sources:
  - https://www.ea.com/ea-play
  - https://www.ea.com
plans:
  - id: electronic-arts-no-public-api
    name: No Public Developer API
    type: enterprise
    description: EA does not currently expose a public developer API. Partner integrations are negotiated
      directly with EA business development; no published per-call pricing.
    entries:
      - label: Partner integration
        name: enterprise_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: contact partner team
        userMultiplied: false
    elements:
      - name: Partner-only integration
  - id: electronic-arts-ea-play
    name: EA Play (Consumer)
    type: subscription
    description: Consumer subscription that bundles EA games and online services. Listed for completeness;
      not a developer API plan.
    entries:
      - label: EA Play monthly
        name: ea_play_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: '5.99'
        userMultiplied: true
      - label: EA Play yearly
        name: ea_play_yearly
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: US
        unit: 1
        price: '39.99'
        userMultiplied: true
      - label: EA Play Pro monthly
        name: ea_play_pro_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: '16.99'
        userMultiplied: true
    elements:
      - name: Game library access
      - name: Member rewards
      - name: Early trials of new releases (Pro)
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
