specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Electronic Arts
providerId: electronic-arts
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Gaming
  - Entertainment
description: 'FOCUS-aligned FinOps shell for Electronic Arts; the only visible commercial billing is
  the consumer EA Play subscription. There is no developer API to allocate against.'
notes: EA does not expose a public developer API. Meters and FOCUS columns describe expected consumer
  subscription billing only.
sources:
  - https://www.ea.com/ea-play
  - https://www.ea.com
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Electronic Arts Inc.
serviceCategory: Entertainment
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Refund
focusColumns:
  ServiceName: EA Play
  ServiceCategory: Entertainment / Subscription
  ProviderName: Electronic Arts
  PublisherName: Electronic Arts Inc.
  InvoiceIssuerName: Electronic Arts Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: subscription_seats
    unit: seat
    aggregation: sum
    dimensions:
      - tier
      - country
  - name: in_game_purchases
    unit: transaction
    aggregation: sum
    dimensions:
      - title
      - country
principles:
  - name: Visibility
    description: Pull EA account billing history; no telemetry API for organizations.
  - name: Allocation
    description: For business deployments, allocate EA Play seat costs to the specific cost-center.
  - name: Optimization
    description: Annual billing is cheaper per month than monthly; right-size to active employee gamers.
  - name: Accountability
    description: HR/IT (for corporate Play perks) reviews seat utilization quarterly.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
