openapi: 3.1.0
info:
  title: EA Developer API
  description: >-
    Electronic Arts provides developer APIs for game services, player authentication, leaderboards, and social features. The EA platform enables game developers to integrate EA's gaming services.
  version: '1.0'
  contact:
    name: Electronic Arts Developer Support
    url: https://developer.ea.com/
externalDocs:
  description: Documentation
  url: https://developer.ea.com/
servers:
  - url: https://api.ea.com
    description: Production
tags:
  - name: Gaming
    description: Gaming operations
security:
  - bearerAuth: []
paths:
  /status:
    get:
      operationId: getStatus
      summary: Get API status
      description: >-
        Returns the current status of the API.
      tags:
        - Gaming
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
